name = "mcp-hub"
main = "src/index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[[kv_namespaces]]
binding = "STATUS_KV"
id = "52045936a14c405ea446f1722f60827b"

# R2 bucket for daily KV → R2 backups (cron 0 3 * * *).
# Uncomment after enabling R2 in the Cloudflare Dashboard
# (Storage → R2 → Enable). Bucket is created via:
#   npx wrangler@latest r2 bucket create mcp-portfolio-backups
# Until R2 is enabled, the cron handler skips uploads gracefully (the code
# checks for env.BACKUPS at runtime).
# [[r2_buckets]]
# binding = "BACKUPS"
# bucket_name = "mcp-portfolio-backups"

# Cron triggers:
#   */5 * * * *  health-check every 5 minutes (writes STATUS_KV)
#   0   3 * * *  daily KV → R2 backup at 03:00 UTC
[triggers]
crons = ["*/5 * * * *", "0 3 * * *"]

# Service bindings to every sibling product Worker. Required because
# intra-account `*.workers.dev` fetches are intercepted by the CF edge and
# return 404 with ~20ms latency. Service bindings bypass the edge and
# dispatch directly to the target Worker.
[[services]]
binding = "PROD_SEC_EDGAR_MCP"
service = "sec-edgar-mcp"

[[services]]
binding = "PROD_GDELT_EVENTS_MCP"
service = "gdelt-events-mcp"

[[services]]
binding = "PROD_FDA_APPROVALS_MCP"
service = "fda-approvals-mcp"

[[services]]
binding = "PROD_USPTO_PATENTS_MCP"
service = "uspto-patents-mcp"

[[services]]
binding = "PROD_WORLD_BANK_ECONOMIC_MCP"
service = "world-bank-economic-mcp"

[[services]]
binding = "PROD_INDIC_NORMALIZE_MCP"
service = "indic-normalize-mcp"

[[services]]
binding = "PROD_DRUG_INTERACTION_MCP"
service = "drug-interaction-mcp"

[[services]]
binding = "PROD_INDIAN_REGULATORY_MCP"
service = "indian-regulatory-mcp"

[[services]]
binding = "PROD_MULTI_CARRIER_TRACKING_MCP"
service = "multi-carrier-tracking-mcp"

[[services]]
binding = "PROD_VERIFICATION_MCP"
service = "verification-mcp"

[[services]]
binding = "PROD_UNIT_CONVERTER_MCP"
service = "unit-converter-mcp"

[[services]]
binding = "PROD_ARXIV_MCP"
